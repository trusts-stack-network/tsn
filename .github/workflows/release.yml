name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.9.15)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tsn-linux-x86_64
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/tsn

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Package
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          cp target/${{ matrix.target }}/release/tsn tsn
          tar czf tsn-${TAG}-linux-x86_64.tar.gz tsn
          echo "ASSET=tsn-${TAG}-linux-x86_64.tar.gz" >> $GITHUB_ENV

      - name: Compute SHA256
        run: |
          sha256sum ${{ env.ASSET }} | awk '{print $1}' > ${{ env.ASSET }}.sha256
          echo "SHA256=$(cat ${{ env.ASSET }}.sha256)" >> $GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release manifest on tsnchain.com
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          ASSET=${{ env.ASSET }}
          SHA256=${{ env.SHA256 }}
          DL_URL="https://github.com/trusts-stack-network/tsn/releases/download/${TAG}/${ASSET}"
          printf '{"version":"%s","assets":{"%s":{"url":"%s","sha256":"%s"}}}\n' \
            "${TAG#v}" "$ASSET" "$DL_URL" "$SHA256" > latest.json
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.MANIFEST_DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @latest.json \
            "${{ secrets.MANIFEST_DEPLOY_URL }}"
        if: ${{ secrets.MANIFEST_DEPLOY_TOKEN != '' }}
