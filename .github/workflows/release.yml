name: Build Release Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.2)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tsn-linux-x86_64
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: tsn-macos-x86_64
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: tsn-macos-aarch64
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tsn-windows-x86_64.exe
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Git config (Windows path fix)
        if: runner.os == 'Windows'
        run: git config --global core.protectNTFS false

      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/tsn

      - name: Prepare artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/tsn ${{ matrix.artifact }}
          tar czf tsn-${{ github.event.inputs.tag }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\tsn.exe ${{ matrix.artifact }}
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath tsn-${{ github.event.inputs.tag }}-${{ matrix.target }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: tsn-${{ github.event.inputs.tag }}-${{ matrix.target }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
