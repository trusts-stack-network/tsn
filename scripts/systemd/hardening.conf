# TSN systemd hardening drop-in.
# Deployed at /etc/systemd/system/tsn-node.service.d/hardening.conf
# Source incident: 2026-05-02 (KF-005 in docs/KNOWN_FAILURES.md)
#
# Effect:
#   - KillMode=mixed: SIGTERM main, SIGKILL all (incl. children) after timeout.
#     Without this, child threads can survive the stop and keep the Sled DB
#     lock open, causing every restart attempt to fail with WouldBlock.
#   - TimeoutStopSec=10: bounded wait for graceful shutdown. Default 90 is
#     too long given we know a hung tsn process is uninteresting to wait for.
#   - Restart=on-failure: avoid respawn after a clean exit (e.g. after
#     auto-update has re-execed the new binary and the parent exited 0).
#   - StartLimitIntervalSec=120 + StartLimitBurst=5: cap restart attempts at
#     5 in 2 minutes; service marked 'failed' beyond that for human review.
#     Without this, we observed 17000+ and 25000+ restart counters during
#     the 2026-05-02 incident.

[Service]
KillMode=mixed
TimeoutStopSec=10
Restart=on-failure
RestartSec=5

[Unit]
StartLimitIntervalSec=120
StartLimitBurst=5
