# TSN systemd ExecStartPre drop-in for DB-lock orphan detection.
# Deployed at /etc/systemd/system/tsn-node.service.d/db-lock-check.conf
# Source: KF-005 in docs/KNOWN_FAILURES.md
#
# Effect: before each start, run /usr/local/bin/tsn-pre-start-check.sh
# which detects an orphan tsn process holding the Sled DB lock, lists its
# PID + cmdline in the journal, and exits 1 to abort the start cleanly.
# Combined with StartLimitBurst=5 in hardening.conf, this guarantees the
# crash-loop pattern from the 2026-05-02 incident cannot recur silently.

[Service]
ExecStartPre=/usr/local/bin/tsn-pre-start-check.sh /opt/tsn/data
