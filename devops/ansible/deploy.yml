---
# Playbook principal de deployment TSN
# Trust Stack Network - Ansible Automation
# Author: Yuki.T Release & DevOps Engineer

- name: "Deployment Trust Stack Network sur {{ ansible_play_hosts | length }} nodes"
  hosts: tsn_nodes
  become: yes
  gather_facts: yes
  serial: "{{ deploy_serial | default('100%') }}"
  
  vars:
    # Configuration par default (peut be surloadede)
    tsn_version: "{{ tsn_version | default('latest') }}"
    docker_registry: "{{ docker_registry | default('ghcr.io/tsn-network') }}"
    force_recreate: "{{ force_recreate | default(false) }}"
    skip_health_check: "{{ skip_health_check | default(false) }}"
    deploy_timeout: 300
    health_timeout: 120
    
  pre_tasks:
    - name: "Verification des prerequisites"
      include_tasks: tasks/prerequisites.yml
      tags: [prerequisites, always]
      
    - name: "Validation de la configuration"
      include_tasks: tasks/validate.yml
      tags: [validate, always]

  tasks:
    - name: "Configuration du system"
      include_tasks: tasks/system.yml
      tags: [system]
      
    - name: "Installation Docker"
      include_tasks: tasks/docker.yml
      tags: [docker]
      
    - name: "Configuration utilisateur TSN"
      include_tasks: tasks/user.yml
      tags: [user]
      
    - name: "Deployment du service TSN"
      include_tasks: tasks/deploy.yml
      tags: [deploy]
      
    - name: "Configuration systemd"
      include_tasks: tasks/systemd.yml
      tags: [systemd]
      
    - name: "Verification de health"
      include_tasks: tasks/health.yml
      tags: [health]
      when: not skip_health_check | bool

  post_tasks:
    - name: "Collecte des metrics de deployment"
      include_tasks: tasks/metrics.yml
      tags: [metrics]
      
    - name: "Rapport de deployment"
      include_tasks: tasks/report.yml
      tags: [report, always]

  handlers:
    - name: restart tsn-node
      systemd:
        name: tsn-node
        state: restarted
        daemon_reload: yes
      
    - name: reload systemd
      systemd:
        daemon_reload: yes