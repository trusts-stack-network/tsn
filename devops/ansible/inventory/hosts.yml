# Inventaire des nodes TSN
# Trust Stack Network - Ansible Inventory
# Author: Yuki.T Release & DevOps Engineer

all:
  vars:
    # Variables globals pour tous les nodes
    ansible_user: ubuntu
    ansible_ssh_private_key_file: "{{ playbook_dir }}/keys/tsn_deploy_key"
    ansible_python_interpreter: /usr/bin/python3
    
    # Configuration TSN
    tsn_version: "{{ tsn_version | default('latest') }}"
    docker_registry: "ghcr.io/tsn-network"
    tsn_service_name: "tsn-node"
    tsn_user: "tsn"
    
    # Directories
    tsn_base_dir: "/opt/tsn"
    tsn_data_dir: "/opt/tsn/data"
    tsn_config_dir: "/opt/tsn/config"
    tsn_logs_dir: "/opt/tsn/logs"
    tsn_backup_dir: "/opt/tsn/backup"

  children:
    tsn_nodes:
      hosts:
        node1:
          ansible_host: node1.tsn.network
          node_id: 1
          node_role: seed
          # Configuration specific node 1 (seed principal)
          tsn_p2p_port: 9000
          tsn_http_port: 8080
          tsn_rpc_port: 9001
          tsn_metrics_port: 9090
          memory_limit: "4g"
          cpu_limit: "2.0"
          
        node2:
          ansible_host: node2.tsn.network  
          node_id: 2
          node_role: validator
          tsn_p2p_port: 9000
          tsn_http_port: 8080
          tsn_rpc_port: 9001
          tsn_metrics_port: 9090
          memory_limit: "4g"
          cpu_limit: "2.0"
          
        node3:
          ansible_host: node3.tsn.network
          node_id: 3
          node_role: validator
          tsn_p2p_port: 9000
          tsn_http_port: 8080
          tsn_rpc_port: 9001
          tsn_metrics_port: 9090
          memory_limit: "4g"
          cpu_limit: "2.0"
          
        node4:
          ansible_host: node4.tsn.network
          node_id: 4
          node_role: validator
          tsn_p2p_port: 9000
          tsn_http_port: 8080
          tsn_rpc_port: 9001
          tsn_metrics_port: 9090
          memory_limit: "4g"
          cpu_limit: "2.0"
          
        node5:
          ansible_host: node5.tsn.network
          node_id: 5
          node_role: archive
          tsn_p2p_port: 9000
          tsn_http_port: 8080
          tsn_rpc_port: 9001
          tsn_metrics_port: 9090
          memory_limit: "8g"  # Plus de memory pour l'archivage
          cpu_limit: "2.0"

    # Groupes par role pour actions specific
    seed_nodes:
      hosts:
        node1:
        
    validator_nodes:
      hosts:
        node2:
        node3:
        node4:
        
    archive_nodes:
      hosts:
        node5:
        
    # Groupes par environnement si necessary
    production:
      hosts:
        node1:
        node2:
        node3:
        node4:
        node5: