# Configuration par default du node TSN
# Trust Stack Network - Post-Quantum Blockchain

[network]
# Adresses de bind
http_bind = "0.0.0.0:8080"
p2p_bind = "0.0.0.0:9000"  
rpc_bind = "0.0.0.0:9001"
metrics_bind = "0.0.0.0:9090"

# Seeds et peers pour le network principal
seeds = [
    "node1.tsn.network:9000",
    "node2.tsn.network:9000", 
    "node3.tsn.network:9000",
    "node4.tsn.network:9000",
    "node5.tsn.network:9000"
]

# Limite de connexions
max_peers = 50
max_inbound_peers = 25
max_outbound_peers = 25

[storage]
# Directory de data
data_dir = "/data/tsn/blocks"
state_dir = "/data/tsn/state"

# Configuration de la base Sled
cache_capacity = 1073741824  # 1GB
flush_every_ms = 1000
compaction_factor = 5

[consensus]
# Configuration PoW/PoS hybride
consensus_algorithm = "hybrid_pow_pos"
block_time_target = 30  # 30 secondes
difficulty_adjustment_window = 144  # 144 blocs ~1h12min
max_block_size = 1048576  # 1MB

[crypto]
# Crypto post-quantique
signature_scheme = "ml_dsa_65"  # FIPS 204 ML-DSA-65
zk_proof_system = "plonky2"     # STARKs quantum-safe
legacy_support = true           # Support Groth16 BN254 pour transition

# Parameters Poseidon
poseidon_rounds = 8
poseidon_width = 4

[logging]
# Configuration des logs
level = "info"
format = "json"
file = "/data/tsn/logs/node.log"
max_size = 104857600  # 100MB
max_files = 10

# Modules specific
module_levels = [
    "tsn=debug",
    "tsn::network=info", 
    "tsn::consensus=debug",
    "tsn::crypto=warn"
]

[metrics]
# Metrics Prometheus
enabled = true
bind = "0.0.0.0:9090"
path = "/metrics"

# Metrics detailed
detailed_mempool = true
detailed_consensus = true
detailed_network = true

[api]
# API REST configuration
enabled = true
bind = "0.0.0.0:8080"
cors_origins = ["*"]
rate_limit = 1000  # requests/minute

# Endpoints activateds
endpoints = [
    "blocks",
    "transactions", 
    "mempool",
    "network",
    "wallet"
]

[rpc]
# RPC pour communication inter-nodes
enabled = true
bind = "0.0.0.0:9001" 
max_connections = 100

[security]
# Parameters de security
enable_tls = false  # TLS managed par proxy/load balancer
trusted_proxies = []
max_request_size = 10485760  # 10MB

# Rate limiting
requests_per_second = 100
burst_size = 200