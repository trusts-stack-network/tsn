# Configuration par défaut de Trust Stack Network

log_level = "info"
data_dir = "/var/lib/tsn"

[network]
p2p_enabled = true
p2p_port = 3030
rpc_enabled = true
rpc_port = 8080
ws_enabled = true
ws_port = 9944
max_peers = 50

[consensus]
mining_enabled = false
difficulty_adjustment = true

[storage]
backend = "sled"
compression = true

[crypto]
post_quantum = true
zk_backend = "plonky2"